<!doctype html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Reveal animations only hide content when JS + IntersectionObserver exist (see index.css .js-reveal).
         Prerendered pages (html[data-prerendered]) skip the hiding: their content is already painted, and
         re-hiding it when React re-renders on boot would flash/blink. App.jsx restores js-reveal after the
         first client-side navigation so scroll reveals still animate on subsequent pages. -->
    <script>if ('IntersectionObserver' in window && !document.documentElement.hasAttribute('data-prerendered')) document.documentElement.classList.add('js-reveal');</script>
    <link rel="preload" as="image" href="/pictures/graphics/web_pics/auto_hero.webp" type="image/webp" fetchpriority="high" />
    <!-- Industrial type pairing: Archivo (display, grotesque) + Source Sans 3 (body, humanist —
         open apertures + wide word space; Manrope set Slovak too cramped). latin-ext subset served automatically. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Source+Sans+3:wght@400..900&display=swap"
      rel="stylesheet"
    />
    <meta name="description" content="Profesionálna požičovňa stavebného náradia a techniky v Senci. Prenájom vŕtačiek, rýpadiel, plošín. Doprava do 24h. ☎ 0948 555 551" />
    <title>Royal Stroje - Požičovňa náradia a stavebnej techniky Senec</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Chatbot widget is loaded lazily from src/App.jsx via requestIdleCallback -->
  </body>
</html>
